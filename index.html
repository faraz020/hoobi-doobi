<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonk Faraz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#FFE9A8;
    --bg-bottom:#FFC65C;
    --pink:#FF6F91;
    --pink-dark:#C43F63;
    --blue:#57C4E5;
    --blue-dark:#1D7999;
    --green:#8BD17C;
    --ink:#3E2145;
    --paper:#FFF8ED;
    --skin:#A9713F;
    --hair:#241712;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    font-family:'Nunito',sans-serif;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,255,255,0.35), transparent 40%),
      radial-gradient(circle at 85% 15%, rgba(255,255,255,0.25), transparent 45%),
      linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    color:var(--ink);
    overflow-x:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 16px 60px;
    position:relative;
  }

  .decor{position:absolute; pointer-events:none; opacity:0.55;}
  .float{animation:drift 6s ease-in-out infinite;}
  @keyframes drift{
    0%,100%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-14px) rotate(8deg);}
  }

  header{text-align:center; margin:10px 0 6px; z-index:2;}

  .eyebrow{
    font-weight:800; font-size:13px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--pink-dark); margin:0 0 4px;
  }

  h1{
    font-family:'Baloo 2',sans-serif; font-weight:800; font-size:clamp(34px,7vw,54px);
    margin:0; color:var(--ink);
    text-shadow:3px 3px 0 var(--paper);
    line-height:1.05;
  }

  .sub{font-weight:600; font-size:15px; color:var(--ink); opacity:0.75; margin:8px 0 0;}

  .badge{
    position:fixed; top:18px; right:18px; background:var(--paper);
    border:3px solid var(--ink); border-radius:16px; padding:10px 16px;
    text-align:center; box-shadow:4px 4px 0 var(--ink); z-index:5;
  }
  .badge .num{
    font-family:'Baloo 2',sans-serif; font-size:26px; font-weight:800; line-height:1;
    color:var(--pink-dark);
  }
  .badge .lbl{
    font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:0.08em;
    color:var(--ink); opacity:0.7;
  }

  .stage-wrap{position:relative; margin-top:28px; z-index:2;}

  .sticker{
    background:var(--paper); border:4px solid var(--ink); border-radius:32px;
    padding:46px 34px 26px; transform:rotate(-1.4deg);
    box-shadow:8px 8px 0 var(--ink); position:relative;
  }

  .stage{
    position:relative; width:260px; height:300px;
    display:flex; align-items:flex-end; justify-content:center;
    touch-action:manipulation;
  }

  .character{width:220px; height:auto; display:block;}

  .eyes-hit, .mouth-hit{opacity:0; transition:opacity .08s linear;}
  .eyes-normal, .mouth-normal{opacity:1; transition:opacity .08s linear;}
  .character.hit .eyes-normal, .character.hit .mouth-normal{opacity:0;}
  .character.hit .eyes-hit, .character.hit .mouth-hit{opacity:1;}

  .brows{transition:transform .15s ease;}
  .character.hit .brows{transform:translateY(3px);}

  .tears path{
    opacity:0; transform:translateY(0);
    transition:opacity .15s ease, transform .55s cubic-bezier(.3,.6,.4,1);
  }
  .character.hit .tears path{opacity:1; transform:translateY(18px);}

  .bonk-star{
    opacity:0; transform:scale(0.3) rotate(-10deg); transform-origin:112px 20px;
    transition:opacity .15s ease, transform .5s cubic-bezier(.34,1.56,.64,1);
  }
  .character.hit .bonk-star{opacity:1; transform:scale(1.15) rotate(12deg);}

  .hammer-wrap{
    position:absolute; top:-46px; right:-4px;
    transform-origin:48% 88%;
    transform:rotate(-58deg);
    z-index:6;
  }

  .nametag{
    display:inline-block; margin-top:6px; background:var(--blue); color:var(--paper);
    font-family:'Baloo 2',sans-serif; font-weight:800; font-size:15px; letter-spacing:0.06em;
    padding:5px 18px; border-radius:999px; border:3px solid var(--ink); transform:rotate(1deg);
  }

  .tag-wrap{text-align:center;}

  .hit-btn{
    margin-top:26px; font-family:'Baloo 2',sans-serif; font-weight:800; font-size:19px;
    color:var(--paper); background:var(--pink-dark); border:4px solid var(--ink);
    border-radius:999px; padding:14px 34px; cursor:pointer;
    box-shadow:5px 5px 0 var(--ink); transition:transform 0.08s ease, box-shadow 0.08s ease;
  }
  .hit-btn:hover{transform:translateY(-2px);}
  .hit-btn:active{transform:translate(3px,3px); box-shadow:2px 2px 0 var(--ink);}
  .hit-btn:focus-visible{outline:3px solid var(--blue-dark); outline-offset:3px;}

  .caption{
    margin-top:16px; font-weight:800; font-size:14px; color:var(--ink);
    opacity:0.8; min-height:20px; text-align:center;
  }

  .pow{
    position:fixed; font-family:'Baloo 2',sans-serif; font-weight:800; font-size:28px;
    color:var(--pink-dark); -webkit-text-stroke:2px var(--ink); pointer-events:none; z-index:20;
  }

  footer{margin-top:34px; font-size:12px; font-weight:600; color:var(--ink); opacity:0.55; z-index:2; text-align:center;}

  @media (prefers-reduced-motion: reduce){
    .float{animation:none !important;}
  }

  @media (max-width:420px){
    .sticker{padding:40px 20px 22px;}
    .stage{width:220px; height:260px;}
    .character{width:190px;}
  }
</style>
</head>
<body>

<div class="decor float" style="top:8%; left:6%; animation-delay:0s;">
  <svg width="34" height="34" viewBox="0 0 24 24"><path d="M12 1l2.6 7.6H22l-6.3 4.6 2.4 7.6L12 16.2 5.9 20.8l2.4-7.6L2 8.6h7.4z" fill="var(--pink)"/></svg>
</div>
<div class="decor float" style="top:18%; right:8%; animation-delay:1.4s;">
  <svg width="26" height="26" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="var(--blue)"/></svg>
</div>
<div class="decor float" style="bottom:16%; left:10%; animation-delay:0.8s;">
  <svg width="30" height="30" viewBox="0 0 24 24"><path d="M12 1l2.6 7.6H22l-6.3 4.6 2.4 7.6L12 16.2 5.9 20.8l2.4-7.6L2 8.6h7.4z" fill="var(--green)"/></svg>
</div>
<div class="decor float" style="bottom:10%; right:12%; animation-delay:2.1s;">
  <svg width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="var(--pink)"/></svg>
</div>

<div class="badge">
  <div class="num" id="hitCount">0</div>
  <div class="lbl">bonks</div>
</div>

<header>
  <p class="eyebrow">a very scientific stress reliever</p>
  <h1>Bonk Faraz</h1>
  <p class="sub">he'll be fine. probably.</p>
</header>

<div class="stage-wrap">
  <div class="sticker">
    <div class="stage" id="stage">

      <div class="hammer-wrap" id="hammer">
        <svg width="100" height="120" viewBox="0 0 100 120">
          <rect x="42" y="46" width="12" height="62" rx="5" fill="#8A5A31"/>
          <rect x="10" y="14" width="60" height="34" rx="8" fill="#6E7680"/>
          <rect x="10" y="14" width="60" height="10" rx="5" fill="#9AA3AC"/>
        </svg>
      </div>

      <svg class="character" id="character" viewBox="0 0 220 300">
        <path d="M78 230 C78 200 92 190 110 190 C128 190 142 200 142 230 L146 285 L74 285 Z" fill="var(--blue)"/>
        <path d="M96 196 L110 216 L124 196 L118 190 L110 200 L102 190 Z" fill="var(--paper)"/>

        <rect x="102" y="150" width="16" height="34" rx="6" fill="var(--skin)"/>

        <ellipse cx="66" cy="150" rx="10" ry="13" fill="var(--skin)"/>
        <ellipse cx="154" cy="150" rx="10" ry="13" fill="var(--skin)"/>

        <circle cx="110" cy="122" r="62" fill="var(--skin)"/>

        <path d="M56 158
                 C48 142 42 124 46 108
                 C50 88 62 56 78 44
                 C88 37 100 46 110 64
                 C120 46 132 37 142 44
                 C158 56 170 88 174 108
                 C178 124 172 142 164 158
                 C150 138 132 126 110 126
                 C88 126 70 138 56 158 Z" fill="var(--hair)"/>

        <ellipse cx="82" cy="140" rx="9" ry="6" fill="#F4A57B" opacity="0.55"/>
        <ellipse cx="138" cy="140" rx="9" ry="6" fill="#F4A57B" opacity="0.55"/>

        <g class="brows">
          <rect x="76" y="104" width="24" height="7" rx="3.5" fill="var(--hair)"/>
          <rect x="120" y="104" width="24" height="7" rx="3.5" fill="var(--hair)"/>
        </g>

        <g class="eyes-normal">
          <circle cx="88" cy="122" r="7" fill="var(--ink)"/>
          <circle cx="132" cy="122" r="7" fill="var(--ink)"/>
          <circle cx="90.5" cy="119.5" r="2" fill="#fff"/>
          <circle cx="134.5" cy="119.5" r="2" fill="#fff"/>
        </g>
        <g class="eyes-hit">
          <path d="M80 120 Q88 128 96 120" stroke="var(--ink)" stroke-width="4" fill="none" stroke-linecap="round"/>
          <path d="M124 120 Q132 128 140 120" stroke="var(--ink)" stroke-width="4" fill="none" stroke-linecap="round"/>
        </g>

        <path class="mouth-normal" d="M96 148 Q110 158 124 148" stroke="var(--ink)" stroke-width="4" fill="none" stroke-linecap="round"/>
        <ellipse class="mouth-hit" cx="110" cy="150" rx="9" ry="12" fill="var(--ink)"/>

        <g class="tears">
          <path d="M80 132 C76 140 76 148 80 150 C84 148 84 140 80 132 Z" fill="var(--blue)"/>
          <path d="M140 132 C136 140 136 148 140 150 C144 148 144 140 140 132 Z" fill="var(--blue)"/>
        </g>

        <g class="bonk-star">
          <path d="M112 4 L118 16 L131 16 L121 24 L125 37 L112 29 L99 37 L103 24 L93 16 L106 16 Z" fill="var(--pink)"/>
        </g>
      </svg>
    </div>

    <div class="tag-wrap">
      <span class="nametag">FARAZ</span>
    </div>
  </div>

  <button class="hit-btn" id="hitBtn">Hit Faraz with hammer</button>
  <p class="caption" id="caption">waiting for a bonk...</p>
</div>

<footer>made for Faraz, one bonk at a time</footer>

<script>
  const stage = document.getElementById('stage');
  const character = document.getElementById('character');
  const hammer = document.getElementById('hammer');
  const hitBtn = document.getElementById('hitBtn');
  const hitCount = document.getElementById('hitCount');
  const caption = document.getElementById('caption');

  const powWords = ['BONK!', 'OW!', 'OOF!', 'YIKES!', 'BOP!'];
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let hits = 0;
  let hideTimer = null;

  function captionFor(n){
    if(n === 0) return 'waiting for a bonk...';
    if(n <= 2) return "he's fine.";
    if(n <= 5) return "he's built different.";
    if(n <= 10) return "faraz.exe is not responding";
    if(n <= 20) return "certified bonk survivor";
    return "achievement unlocked: unbreakable";
  }

  function spawnPow(){
    const pow = document.createElement('div');
    pow.className = 'pow';
    pow.textContent = powWords[Math.floor(Math.random() * powWords.length)];
    const rect = stage.getBoundingClientRect();
    const x = rect.left + rect.width * (0.28 + Math.random() * 0.44);
    const y = rect.top + rect.height * 0.22;
    pow.style.left = x + 'px';
    pow.style.top = y + 'px';
    document.body.appendChild(pow);

    const rot = Math.random() * 24 - 12;
    const anim = pow.animate([
      { opacity: 0, transform: `translateY(0px) scale(0.5) rotate(${rot}deg)` },
      { opacity: 1, transform: `translateY(-10px) scale(1.15) rotate(${rot}deg)`, offset: 0.18 },
      { opacity: 0, transform: `translateY(-70px) scale(1) rotate(${rot}deg)` }
    ], { duration: 900, easing: 'ease-out' });
    anim.onfinish = () => pow.remove();
  }

  function swingHammer(){
    hammer.animate([
      { transform: 'rotate(-58deg)' },
      { transform: 'rotate(34deg)', offset: 0.42 },
      { transform: 'rotate(14deg)', offset: 0.58 },
      { transform: 'rotate(-58deg)' }
    ], { duration: 520, easing: 'cubic-bezier(.5,0,.4,1)' });
  }

  function shakeStage(delay){
    stage.animate([
      { transform: 'translateX(0)' },
      { transform: 'translateX(-6px)', offset: 0.2 },
      { transform: 'translateX(6px)', offset: 0.4 },
      { transform: 'translateX(-4px)', offset: 0.6 },
      { transform: 'translateX(4px)', offset: 0.8 },
      { transform: 'translateX(0)' }
    ], { duration: 380, delay: delay });
  }

  function squishCharacter(){
    character.animate([
      { transform: 'scale(1,1) translateY(0)' },
      { transform: 'scale(1.08,0.82) translateY(10px)', offset: 0.15 },
      { transform: 'scale(0.94,1.08) translateY(-6px)', offset: 0.35 },
      { transform: 'scale(1.03,0.96) translateY(2px)', offset: 0.55 },
      { transform: 'scale(1,1) translateY(0)' }
    ], { duration: 650, easing: 'cubic-bezier(.36,1.8,.4,1)' });
  }

  function bonk(){
    hits += 1;
    hitCount.textContent = hits;
    caption.textContent = captionFor(hits);

    if(hideTimer) clearTimeout(hideTimer);

    const impactDelay = reduceMotion ? 0 : 180;

    swingHammer();
    if(!reduceMotion) shakeStage(impactDelay);

    setTimeout(() => {
      character.classList.add('hit');
      if(!reduceMotion) squishCharacter();
      spawnPow();

      hideTimer = setTimeout(() => {
        character.classList.remove('hit');
        hideTimer = null;
      }, 650);
    }, impactDelay);
  }

  hitBtn.addEventListener('click', bonk);
</script>

</body>
</html>
